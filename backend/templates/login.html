<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · Email Forensics</title>

    <!-- Global CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/mobile.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/theme.css') }}">


    <!-- Login Page Styles -->
    <style>
        body.auth-page {
            min-height: 100vh;
            background: radial-gradient(circle at top, #1e293b, #020617);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .auth-card {
            background: rgba(255,255,255,0.97);
            border-radius: 22px;
            padding: 36px 32px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.45);
            animation: fadeUp 0.6s ease both;
        }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(20px); }
            to { opacity:1; transform:none; }
        }

        .avatar-preview {
            width: 56px;
            height: 56px;
            margin: 0 auto 18px;
            border-radius: 50%;
            background: linear-gradient(135deg,#3b82f6,#2563eb);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 22px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 26px;
        }

        .auth-header h1 {
            font-size: 28px;
            font-weight: 800;
            color: #0f172a;
        }

        .auth-header p {
            font-size: 14px;
            color: #64748b;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
            display: block;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper button {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        .form-error {
            font-size: 12px;
            color: #dc2626;
            min-height: 16px;
        }

        .btn-login-main {
            margin-top: 6px;
            padding: 14px;
            border-radius: 14px;
            font-weight: 700;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-login-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 30px rgba(37,99,235,0.35);
        }

        .auth-divider {
            display: flex;
            align-items: center;
            margin: 26px 0;
            gap: 12px;
            font-size: 13px;
            color: #94a3b8;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid #e5e7eb;
            background: white;
            font-weight: 600;
            color: #111827;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .google-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 30px rgba(0,0,0,0.15);
        }

        .auth-footer {
            margin-top: 22px;
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
        }

        .auth-links {
            margin-top: 14px;
            text-align: center;
            font-size: 13px;
        }

        .auth-links a {
            color: #64748b;
            text-decoration: none;
        }
        /* Admin login link */
        .admin-access {
            margin-top: 16px;
            text-align: center;
            font-size: 13px;
            color: #64748b;
        }

        .admin-link {
            display: inline-block;
            margin-top: 6px;
            padding: 6px 12px;
            border-radius: 8px;
            background: rgba(99, 102, 241, 0.1);
            color: #6366f1;
            text-decoration: none;
            transition: 0.3s;
        }

        .admin-link:hover {
            background: rgba(99, 102, 241, 0.2);
            transform: translateY(-2px);
        }
    </style>
</head>

<body class="auth-page">

<div class="auth-container">
    <div class="auth-card">

        

        <div class="auth-header">
            <h1>Email Forensics</h1>
            <p>Secure access to your forensic dashboard</p>
        </div>

        <!-- Manual Login -->
        <form class="auth-form" id="manualLoginForm">
            <div class="form-group">
                <label>Username or Email</label>
                <input type="text" id="emailInput" placeholder="analyst@example.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="passwordInput" placeholder="Enter your password" required>
                    <button type="button" id="togglePassword">👁️</button>
                </div>
            </div>

            <small class="form-error" id="loginError"></small>

            <button type="submit" class="btn-login-main" id="loginBtn">
                Sign In
            </button>
        </form>

        <div class="auth-divider">or</div>

        <!-- Google OAuth -->
        <a href="/auth/google" class="google-btn">
            Continue with Google
        </a>

        <!-- Admin Access -->
        <div class="admin-access">
            <p>Admin access?</p>
            <a href="/admin/login" class="admin-link">Go to Admin Panel</a>
        </div>

        <div class="auth-footer">
            OAuth 2.0 Secure Login · Session Protected
        </div>

        <div class="auth-links">
            <a href="/forgot-password" class="text-muted">Forgot password?</a> · <a href="#">Create account</a>
        </div>

    </div>
</div>

<script src="{{ url_for('static', filename='assets/js/main.js') }}"></script>
</body>
</html>
